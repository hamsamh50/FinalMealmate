<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Restaurant - Meal Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header h2 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2><i class="bi bi-pencil-square"></i> Update Restaurant</h2>
            <p class="text-muted">Modify restaurant details</p>
        </div>

        <form action="{% url 'update_restaurant' restaurant.id %}" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name" class="form-label">Restaurant Name</label>
                <input type="text" id="name" name="name" class="form-control" value="{{restaurant.name}}" required>
            </div>

            <div class="form-group">
                <label for="picture" class="form-label">Restaurant Image URL</label>
                <input type="url" id="picture" name="picture" class="form-control" value="{{restaurant.picture}}">
            </div>

            <div class="form-group">
                <label for="cuisine" class="form-label">Cuisine Type</label>
                <input type="text" id="cuisine" name="cuisine" class="form-control" value="{{restaurant.cuisine}}" required>
            </div>

            <div class="form-group">
                <label for="rating" class="form-label">Rating (0-5)</label>
                <input type="number" id="rating" name="rating" class="form-control" min="0" max="5" step="0.5" value="{{restaurant.rating}}" required>
            </div>

            <button type="submit" class="btn btn-submit btn-primary mt-3"><i class="bi bi-check-circle"></i> Update Restaurant</button>
            <a href="{% url 'open_show_restaurant' %}" class="btn btn-outline-secondary w-100 mt-2"><i class="bi bi-arrow-left"></i> Back</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
